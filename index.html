<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Budget VP"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="theme-color" content="#0a0a0f"/>
  <link rel="manifest" href="manifest.json"/>
  <link rel="apple-touch-icon" href="icon-192.png"/>
  <title>Budget VP</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html,body{height:100%;background:#0a0a0f;color:#e2e8f0;font-size:13px;font-family:-apple-system,'Segoe UI',sans-serif}
    #app{position:fixed;top:0;left:0;right:0;bottom:0;display:flex;flex-direction:column}
    #hdr{flex-shrink:0;background:#080d1a;border-bottom:1px solid #1e3a5f;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;padding-top:max(10px,env(safe-area-inset-top))}
    #nav{flex-shrink:0;background:#080d1a;border-bottom:1px solid #1e3a5f;display:flex;overflow-x:auto;-webkit-overflow-scrolling:touch}
    #nav::-webkit-scrollbar{display:none}
    #nav button{flex-shrink:0;min-width:52px;background:none;border:none;border-bottom:2px solid transparent;color:#475569;padding:10px 6px;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;font-family:inherit;transition:color .15s}
    #nav button.on{border-bottom-color:#3b82f6;color:#60a5fa}
    #nav button .i{font-size:18px}
    #nav button .l{font-size:9px;font-weight:600}
    #scr{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;overscroll-behavior:contain}
    #bot{flex-shrink:0;height:env(safe-area-inset-bottom);background:#080d1a}
    .page{padding:12px 12px 40px}
    .card{background:#0f172a;border:1px solid #1e3a5f;border-radius:12px;overflow:hidden;margin-bottom:12px}
    .sh{background:#0c1628;border-bottom:1px solid #1e3a5f;padding:8px 12px;font-size:11px;font-weight:600;color:#3b82f6;text-transform:uppercase;letter-spacing:.06em}
    .row{display:flex;align-items:center;gap:10px;padding:11px 12px;border-bottom:1px solid #111827}
    .row:last-child{border-bottom:none}
    .kg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
    .kb{background:#0f172a;border:1px solid #1e3a5f;border-radius:10px;padding:12px}
    .kl{font-size:10px;color:#475569;margin-bottom:5px}
    .kv{font-size:20px;font-weight:700;font-family:'SF Mono','Courier New',monospace}
    .mn{font-family:'SF Mono','Courier New',monospace}
    .pos{color:#22c55e}.neg{color:#ef4444}.wa{color:#f59e0b}.mu{color:#475569}
    .ib{background:#0c1a2e;border:1px solid #1e3a5f;border-left:3px solid #3b82f6;border-radius:6px;padding:10px 12px;font-size:11px;color:#94a3b8;line-height:1.6;margin-bottom:12px}
    .tg{position:relative;width:40px;height:24px;cursor:pointer;display:inline-flex;align-items:center;flex-shrink:0}
    .tg input{position:absolute;opacity:0;width:0;height:0}
    .tg .sl{position:absolute;inset:0;background:#334155;border-radius:24px;transition:.2s}
    .tg .sl::after{content:'';position:absolute;width:18px;height:18px;background:#fff;border-radius:50%;top:3px;left:3px;transition:.2s}
    .tg input:checked+.sl{background:#22c55e}
    .tg input:checked+.sl::after{left:19px}
    .tg input:disabled+.sl{background:#1d4ed8;cursor:not-allowed}
    .bb{background:#1e293b;border-radius:3px;height:4px;overflow:hidden;margin-top:4px}
    .bf{height:100%;border-radius:3px}
    input[type=number]{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:5px 8px;border-radius:6px;font-family:'SF Mono','Courier New',monospace;font-size:12px;width:88px;text-align:right}
    select{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:5px 6px;border-radius:6px;font-size:11px;font-family:inherit}
    table{border-collapse:collapse;width:100%}
    th{background:#0c1628;color:#475569;font-weight:600;font-size:10px;text-transform:uppercase;padding:7px 8px;text-align:left;border-bottom:1px solid #1e3a5f;white-space:nowrap}
    td{padding:6px 8px;border-bottom:1px solid #111827;font-size:12px;vertical-align:middle}
    .ch{padding:5px 12px;background:#0a0f1e;font-size:10px;color:#3b82f6;font-weight:600;text-transform:uppercase;letter-spacing:.05em}
    .bc{background:#1e293b;border:1px solid #334155;color:#e2e8f0;width:32px;height:32px;border-radius:8px;cursor:pointer;font-size:20px;line-height:1;flex-shrink:0;display:inline-flex;align-items:center;justify-content:center}
    .ba{width:100%;background:#1d4ed8;border:none;border-radius:10px;padding:13px;color:#fff;font-size:14px;font-weight:600;margin-bottom:12px;cursor:pointer;font-family:inherit}
    .tag{display:inline-block;padding:1px 7px;border-radius:12px;font-size:10px;font-weight:600}
    .tg-g{background:#052e16;color:#4ade80;border:1px solid #166534}
    .tg-a{background:#2d1f00;color:#fbbf24;border:1px solid #78350f}
    .tg-b{background:#0c1a3a;color:#60a5fa;border:1px solid #1d4ed8}
  </style>
</head>
<body>
<div id="app">
  <div id="hdr">
    <div>
      <div style="font-weight:700;font-size:15px;color:#e2e8f0">💰 Budget Victor</div>
      <div style="font-size:10px;color:#334155;margin-top:1px">Big Dutchman · 2026</div>
    </div>
    <div style="text-align:right">
      <div style="font-size:9px;color:#475569">Budget dispo</div>
      <div id="hdrDispo" class="mn" style="font-weight:700;font-size:16px;color:#22c55e">–</div>
    </div>
  </div>
  <div id="nav">
    <button class="on" onclick="gotoTab(0)"><span class="i">📊</span><span class="l">Bord</span></button>
    <button onclick="gotoTab(1)"><span class="i">✅</span><span class="l">Dépenses</span></button>
    <button onclick="gotoTab(2)"><span class="i">📅</span><span class="l">Projection</span></button>
    <button onclick="gotoTab(3)"><span class="i">🏠</span><span class="l">Meubles</span></button>
    <button onclick="gotoTab(4)"><span class="i">🎯</span><span class="l">Projets</span></button>
    <button onclick="gotoTab(5)"><span class="i">📈</span><span class="l">Graphique</span></button>
    <button onclick="gotoTab(6)"><span class="i">🚗</span><span class="l">Leasing</span></button>
  </div>
  <div id="scr"></div>
  <div id="bot"></div>
</div>
<script>
/* Budget VP — Vanilla JS */
const SALAIRE = 2608, SOLDE0 = 2610, AVION_PX = 350;
const MOIS = ["Mar 2026","Avr 2026","Mai 2026","Jun 2026","Juil 2026","Aout 2026","Sep 2026","Oct 2026","Nov 2026","Déc 2026","Jan 2027","Fév 2027","Mar 2027"];

/* ── STATE ── */
const S = {
  tab: 0,
  dep: load('dep', [
    {cat:"🏠 Logement",  lb:"Loyer Kalt",           on:"🔒", v:661.14, note:"h&l hub-1 GmbH"},
    {cat:"🏠 Logement",  lb:"Charges NK",            on:"🔒", v:170,    note:"Chauf+Divers+Cuisine"},
    {cat:"🏠 Logement",  lb:"EWE Électricité",       on:"1",  v:70,     note:"Grünstrom 12"},
    {cat:"🍽️ Alim.",    lb:"Repas midi ×21",        on:"1",  v:188.16, note:"21 × 8,96€"},
    {cat:"🍽️ Alim.",    lb:"Repas soir / courses",  on:"1",  v:150,    note:"30 × 5€ moyen"},
    {cat:"🍽️ Alim.",    lb:"Sorties / extras",      on:"0",  v:0,      note:"Budget indicatif"},
    {cat:"📱 Essentiels",lb:"Bouygues Telecom",      on:"1",  v:15.99,  note:"Forfait mobile FR"},
    {cat:"📱 Essentiels",lb:"Telekom Internet DE",   on:"0",  v:57.95,  note:"À confirmer"},
    {cat:"📱 Essentiels",lb:"N26 Metal",             on:"1",  v:15.21,  note:"Compte principal DE"},
    {cat:"📱 Essentiels",lb:"Crédit Mutuel",         on:"1",  v:3.5,    note:"Compte FR"},
    {cat:"🎬 Streaming", lb:"Netflix",               on:"0",  v:7.99,   note:"Vidéo"},
    {cat:"🎬 Streaming", lb:"Deezer",                on:"1",  v:11.99,  note:"Musique"},
    {cat:"🎬 Streaming", lb:"Canal+",                on:"1",  v:19.99,  note:"Séries & sport"},
    {cat:"🎬 Streaming", lb:"Ligue 1+",              on:"1",  v:14.99,  note:"Foot FR"},
    {cat:"🎬 Streaming", lb:"Prime Video",           on:"1",  v:2,      note:"Amazon"},
    {cat:"🎬 Streaming", lb:"L'Équipe",              on:"1",  v:4.99,   note:"Actu sport"},
    {cat:"🎬 Streaming", lb:"Samsung TV+",           on:"0",  v:1.99,   note:"Streaming"},
    {cat:"🎬 Streaming", lb:"YouTube Premium",       on:"0",  v:12.99,  note:"Sans pub"},
    {cat:"💼 Pro",       lb:"Adobe CC",              on:"1",  v:17.59,  note:"Suite créative"},
    {cat:"💼 Pro",       lb:"Claude",                on:"1",  v:22.99,  note:"IA"},
    {cat:"💼 Pro",       lb:"Google One",            on:"1",  v:1.99,   note:"2 To stockage"},
    {cat:"🚗 Transport", lb:"Essence travail",       on:"1",  v:115.92, note:"46km/j × ~22j"},
    {cat:"✈️ Voyages",   lb:"A/R Vechta↔St-Naz.",   on:"0",  v:350,    note:"Avion variable"},
    {cat:"🎮 Loisirs",   lb:"Padel ×10/mois",       on:"1",  v:60,     note:"10 sessions × 6€"},
    {cat:"🎮 Loisirs",   lb:"Sorties / divers",      on:"0",  v:50,     note:"Budget indicatif"},
    {cat:"📈 Invest.",   lb:"Épargne Équilibre",     on:"0",  v:100,    note:"Objectif mensuel"},
    {cat:"📈 Invest.",   lb:"Actions Air Liquide",   on:"0",  v:200,    note:"Investissement"},
  ]),
  mob: load('mob', [
    {piece:"Chambre",       art:"Lit",                 four:"IKEA",     px:103.2,  ok:"1", mois:"Avr 2026"},
    {piece:"Chambre",       art:"Table de chevet",     four:"IKEA",     px:28,     ok:"1", mois:"Avr 2026"},
    {piece:"Chambre",       art:"Commode",             four:"IKEA",     px:159,    ok:"1", mois:"Avr 2026"},
    {piece:"Chambre",       art:"Armoire",             four:"IKEA",     px:159,    ok:"1", mois:"Avr 2026"},
    {piece:"Salon",         art:"Meuble TV",           four:"IKEA",     px:109.98, ok:"1", mois:"Avr 2026"},
    {piece:"Salon",         art:"Aquarium",            four:"Stand by", px:0,      ok:"0", mois:""},
    {piece:"Salon",         art:"Canapé",              four:"IKEA",     px:494.1,  ok:"1", mois:"Avr 2026"},
    {piece:"Salon",         art:"Table basse",         four:"IKEA",     px:79.99,  ok:"1", mois:"Avr 2026"},
    {piece:"Cuisine",       art:"Rangement bouteilles",four:"Stand by", px:88.99,  ok:"0", mois:""},
    {piece:"Cuisine",       art:"Divers IKEA",         four:"IKEA",     px:49.99,  ok:"1", mois:"Avr 2026"},
    {piece:"Salle de bain", art:"Servante",            four:"IKEA",     px:68.99,  ok:"1", mois:"Avr 2026"},
    {piece:"Salle de bain", art:"Meuble lavabo",       four:"IKEA",     px:54.99,  ok:"1", mois:"Avr 2026"},
    {piece:"Électroménager",art:"Aspirateur",          four:"Stand by", px:250,    ok:"0", mois:"Juin 2026"},
    {piece:"Divers",        art:"Petit meuble couloir",four:"Don",      px:0,      ok:"0", mois:""},
  ]),
  cau: load('cau', [
    {lb:"Caution 1/3", mois:"Avr 2026",  v:443.33, ok:"0"},
    {lb:"Caution 2/3", mois:"Mai 2026",  v:443.33, ok:"0"},
    {lb:"Caution 3/3", mois:"Juin 2026", v:443.34, ok:"0"},
  ]),
  prj: load('prj', [
    {nom:"WE entre potes Lyon",  m1:"Mar 2026",v1:75,  m2:"Mai 2026",v2:170,m3:"Jun 2026",v3:630},
    {nom:"WE Strasbourg",        m1:"",        v1:360, m2:"",        v2:170,m3:"",        v3:355},
    {nom:"Montre",               m1:"",        v1:575, m2:"",        v2:0,  m3:"",        v3:0},
    {nom:"TV + Barre de son",    m1:"",        v1:730, m2:"",        v2:0,  m3:"",        v3:0},
  ]),
  avions: load('avi', Array(13).fill(0).map((_,i)=>i===0?1:0)),
  extras: load('ext', Array(13).fill(0)),
};

/* ── PERSIST ── */
function load(k,d){try{const v=localStorage.getItem('bvp_'+k);return v?JSON.parse(v):d;}catch{return d;}}
function save(k,v){try{localStorage.setItem('bvp_'+k,JSON.stringify(v));}catch{}}
function persist(){save('dep',S.dep);save('mob',S.mob);save('cau',S.cau);save('prj',S.prj);save('avi',S.avions);save('ext',S.extras);}

/* ── CALC ── */
function isOn(d){return d.on==="1"||d.on==="🔒";}
function totalDep(){return S.dep.filter(isOn).reduce((s,d)=>s+d.v,0);}
function byCat(){
  const t={};
  S.dep.forEach(d=>{if(!t[d.cat])t[d.cat]=0;if(isOn(d))t[d.cat]+=d.v;});
  return t;
}
function mobByMois(){
  const t={};
  S.mob.forEach(m=>{if(m.ok==="1"&&m.mois&&m.px>0)t[m.mois]=(t[m.mois]||0)+m.px;});
  return t;
}
function cauByMois(){
  const t={};
  S.cau.forEach(c=>{if(c.ok!=="1")t[c.mois]=(t[c.mois]||0)+c.v;});
  return t;
}
function prjByMois(){
  const t={};
  const MOPTS=["Mar 2026","Avr 2026","Mai 2026","Jun 2026","Juil 2026","Aout 2026","Sep 2026","Oct 2026","Nov 2026","Déc 2026","Jan 2027","Fév 2027","Mar 2027"];
  S.prj.forEach(p=>{
    if(p.m1&&MOPTS.includes(p.m1))t[p.m1]=(t[p.m1]||0)+(p.v1||0);
    if(p.m2&&MOPTS.includes(p.m2))t[p.m2]=(t[p.m2]||0)+(p.v2||0);
    if(p.m3&&MOPTS.includes(p.m3))t[p.m3]=(t[p.m3]||0)+(p.v3||0);
  });
  return t;
}
function getLeasingState(){
  return load('leasing',{branding:false,stKl:1,brutMens:3850,pause:150,debut:'Aout 2026',actif:false});
}
function calcLeasingImpact(ls){
  const loyer=ls.branding?510:530;
  const tauxMarginal={1:0.38,3:0.35,4:0.38,5:0.42}[ls.stKl]||0.38;
  const ecoBrut=loyer*tauxMarginal;
  const coutNet=Math.round(loyer-ecoBrut);
  // Essence économisée (dépense désactivée si leasing actif)
  const essence=S.dep.find(d=>d.lb==="Essence travail");
  const essenceEco=essence?essence.v:115.92;
  return {loyer, coutNet, essenceEco, netSalaire: SALAIRE - coutNet + essenceEco};
}
function calcProj(){
  const ls=getLeasingState();
  const lImpact=ls.actif?calcLeasingImpact(ls):null;
  const dep=totalDep(), log=S.dep.slice(0,3).filter(isOn).reduce((s,d)=>s+d.v,0);
  const mb=mobByMois(), cb=cauByMois(), pb=prjByMois();
  let sol=SOLDE0; const rows=[];
  MOIS.forEach((lb,i)=>{
    const sd=sol;
    // Leasing actif à partir du mois choisi ?
    const leasingCeMois=ls.actif && MOIS.indexOf(ls.debut)>=0 && i>=MOIS.indexOf(ls.debut);
    // Si leasing actif ce mois : salaire net différent + essence retirée des charges
    const salaireMois = leasingCeMois ? lImpact.netSalaire : SALAIRE;
    const depMois = leasingCeMois
      ? dep - (S.dep.find(d=>d.lb==="Essence travail"&&isOn(d))?.v||0) // retire essence
      : dep;
    const d=i===0?depMois-log:depMois;
    const av=(S.avions[i]||0)*AVION_PX, me=mb[lb]||0, ca=cb[lb]||0, pr=pb[lb]||0, ex=S.extras[i]||0;
    const avant=sd-d-av-me-ca-pr+ex, fin=avant+salaireMois, eco=fin-sd;
    sol=fin;
    rows.push({lb,sd,d,av,me,ca,pr,ex,avant,fin,eco,leasingActif:leasingCeMois,salaireMois});
  });
  return rows;
}

/* ── FORMAT ── */
const eur=v=>Math.abs(v).toLocaleString('fr-FR',{minimumFractionDigits:2,maximumFractionDigits:2})+'€';
const pct=v=>(v*100).toFixed(1)+'%';
const cl=v=>v>0?'pos':v<0?'neg':'mu';
const catColors={"🏠 Logement":"#6366f1","🍽️ Alim.":"#f59e0b","📱 Essentiels":"#06b6d4","🎬 Streaming":"#a855f7","💼 Pro":"#3b82f6","🚗 Transport":"#10b981","✈️ Voyages":"#f97316","🎮 Loisirs":"#ec4899","📈 Invest.":"#22c55e"};

/* ── RENDER HELPERS ── */
function toggle(on,locked,cb){
  return `<label class="tg"><input type="checkbox" ${on?"checked":""} ${locked?"disabled":""} onchange="${cb}"><span class="sl"></span></label>`;
}
function bar(v,max,color){
  const p=max>0?Math.min(v/max*100,100):0;
  return `<div class="bb"><div class="bf" style="width:${p}%;background:${color}"></div></div>`;
}
function kpi(lbl,val,cls,sub=''){
  return `<div class="kb"><div class="kl">${lbl}</div><div class="kv ${cls}">${val}</div>${sub?`<div class="mn mu" style="font-size:10px;margin-top:4px">${sub}</div>`:''}</div>`;
}

/* ── TAB 0: TABLEAU DE BORD ── */
function renderBord(){
  const tot=totalDep(), bc=byCat(), cats=[...new Set(S.dep.map(d=>d.cat))];
  const dispo=SALAIRE-tot;
  const proj=calcProj();
  let h=`<div class="page">`;
  h+=`<div class="kg">
    ${kpi("💼 Salaire net",eur(SALAIRE),'pos',eur(SALAIRE*12)+' / an')}
    ${kpi("💰 Solde Mars 2026",eur(SOLDE0),'pos','')}
    ${kpi("💸 Dépenses/mois",eur(tot),'wa',eur(tot*12)+' / an')}
    ${kpi("✅ Budget dispo",eur(dispo),dispo>=0?'pos':'neg',eur(dispo*12)+' / an')}
  </div>`;

  h+=`<div class="card"><div class="sh">📋 Dépenses par catégorie</div>`;
  cats.forEach(cat=>{
    const v=bc[cat]||0;
    const col=catColors[cat]||'#3b82f6';
    h+=`<div style="padding:10px 12px;border-bottom:1px solid #111827">
      <div style="display:flex;justify-content:space-between;margin-bottom:2px">
        <span style="font-size:12px">${cat}</span>
        <span class="mn" style="font-size:12px">${v>0?eur(v):'–'}</span>
      </div>
      ${v>0?`<div style="display:flex;align-items:center;gap:8px">${bar(v,SALAIRE,col)}<span class="mn mu" style="font-size:10px;flex-shrink:0">${pct(v/SALAIRE)}</span></div>`:''}
    </div>`;
  });
  h+=`<div style="padding:10px 12px;background:#0c1628;display:flex;justify-content:space-between">
    <span style="font-weight:700">TOTAL</span>
    <div style="text-align:right"><div class="mn wa" style="font-weight:700">${eur(tot)}</div><div class="mn mu" style="font-size:10px">${pct(tot/SALAIRE)} du salaire</div></div>
  </div></div>`;

  h+=`<div class="card"><div class="sh">📅 Projection mars→déc 2026</div><div style="overflow-x:auto"><table>
    <tr><th>Ligne</th>${proj.slice(0,10).map(m=>`<th style="text-align:right">${m.lb.split(' ')[0]}</th>`).join('')}</tr>
    ${[['Solde fin','fin','pos'],['Avant salaire','avant','wa'],['Économie','eco','']].map(([lb,k,c])=>
      `<tr><td class="mu" style="white-space:nowrap">${lb}</td>${proj.slice(0,10).map(m=>`<td class="mn ${c||cl(m[k])}" style="text-align:right">${eur(m[k])}</td>`).join('')}</tr>`
    ).join('')}
  </table></div></div>`;

  h+=`<div class="card"><div class="sh">📄 Infos contrat</div>`;
  [["🏢","Big Dutchman Service GmbH · Auf der Lage 2, 49377 Vechta"],
   ["💼","Logistics Planner · CDI · Depuis 15/01/2026"],
   ["💰","3 850 + 150 BD-E = 4 000€ brut → ~2 544€ net"],
   ["🏠","Hauptstr. 44 App.11 · 49457 Drebber · dès 01/04/2026"],
   ["⚡","EWE Grünstrom 12 · n°1004294267 · 70€/mois"],
   ["🔑","Caution 1 330€ (3 × ~443€) · h&l hub-1 GmbH"],
   ["📅","Probezeit 6 mois → jusqu'au 14/07/2026"],
   ["🏖️","30 jours congés/an (20 légaux + 10 contractuels)"]
  ].forEach(([i,t])=>{
    h+=`<div style="display:flex;gap:10px;padding:9px 12px;border-bottom:1px solid #111827;align-items:flex-start">
      <span style="font-size:16px;flex-shrink:0">${i}</span>
      <span style="font-size:12px;color:#cbd5e1;line-height:1.4">${t}</span>
    </div>`;
  });
  h+=`</div></div>`;
  return h;
}

/* ── TAB 1: DÉPENSES ── */
function renderDep(){
  const tot=totalDep(), dispo=SALAIRE-tot, bc=byCat();
  const cats=[...new Set(S.dep.map(d=>d.cat))];
  let h=`<div class="page">`;
  h+=`<div class="kg">
    ${kpi("💸 Dépenses actives",eur(tot),'wa',eur(tot*12)+' / an')}
    ${kpi("✅ Budget dispo",eur(dispo),dispo>=0?'pos':'neg',eur(dispo*12)+' / an')}
  </div>`;

  cats.forEach(cat=>{

/* ── TAB 5: GRAPHIQUE ── */
function renderGraph(){
  const proj=calcProj();
  let cumul=0;
  const cumuArr=proj.map(m=>{cumul+=m.eco;return cumul;});

  const fins=proj.map(m=>m.fin);
  const avants=proj.map(m=>m.avant);
  const allVals=[...fins,...avants,0];
  const minV=Math.min(...allVals), maxV=Math.max(...allVals);
  const range=maxV-minV||1;

  const W=320, H=180, PAD={t:16,r:12,b:40,l:56};
  const gW=W-PAD.l-PAD.r, gH=H-PAD.t-PAD.b;
  const N=proj.length;
  const xStep=gW/(N-1);

  function yPos(v){return PAD.t+gH-(((v-minV)/range)*gH);}
  function xPos(i){return PAD.l+i*xStep;}

  // Build SVG paths
  const finPts=proj.map((m,i)=>`${xPos(i).toFixed(1)},${yPos(m.fin).toFixed(1)}`).join(' ');
  const avantPts=proj.map((m,i)=>`${xPos(i).toFixed(1)},${yPos(m.avant).toFixed(1)}`).join(' ');

  // Area under finMois
  const areaFin=`M${xPos(0)},${yPos(proj[0].fin)} `+proj.slice(1).map((m,i)=>`L${xPos(i+1)},${yPos(m.fin)}`).join(' ')+` L${xPos(N-1)},${PAD.t+gH} L${xPos(0)},${PAD.t+gH} Z`;

  // Grid lines
  const nGrid=4;
  let gridLines='', gridLabels='';
  for(let g=0;g<=nGrid;g++){
    const v=minV+(range/nGrid)*g;
    const y=yPos(v);
    gridLines+=`<line x1="${PAD.l}" y1="${y.toFixed(1)}" x2="${W-PAD.r}" y2="${y.toFixed(1)}" stroke="#1e293b" stroke-width="1"/>`;
    gridLabels+=`<text x="${PAD.l-4}" y="${(y+4).toFixed(1)}" text-anchor="end" fill="#475569" font-size="9">${v>=0?'':'-'}${Math.abs(v/1000).toFixed(0)}k</text>`;
  }

  // Zero line
  const y0=yPos(0);
  const zeroLine=y0>=PAD.t&&y0<=PAD.t+gH?`<line x1="${PAD.l}" y1="${y0.toFixed(1)}" x2="${W-PAD.r}" y2="${y0.toFixed(1)}" stroke="#334155" stroke-width="1.5" stroke-dasharray="4,3"/>`:'';

  // X labels (every 2 months)
  let xLabels='';
  proj.forEach((m,i)=>{
    if(i%2===0){
      xLabels+=`<text x="${xPos(i).toFixed(1)}" y="${H-6}" text-anchor="middle" fill="#475569" font-size="8">${m.lb.split(' ')[0]}</text>`;
    }
  });

  // Dots for fin
  const dots=proj.map((m,i)=>{
    const x=xPos(i).toFixed(1), y=yPos(m.fin).toFixed(1);
    const col=m.fin>=0?'#22c55e':'#ef4444';
    return `<circle cx="${x}" cy="${y}" r="3" fill="${col}" stroke="#0a0a0f" stroke-width="1.5"/>`;
  }).join('');

  const svg=`<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-width:${W}px;display:block">
    <defs>
      <linearGradient id="gFin" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#22c55e" stop-opacity="0.3"/>
        <stop offset="100%" stop-color="#22c55e" stop-opacity="0.02"/>
      </linearGradient>
    </defs>
    ${gridLines}${gridLabels}${zeroLine}${xLabels}
    <path d="${areaFin}" fill="url(#gFin)"/>
    <polyline points="${avantPts}" fill="none" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.7"/>
    <polyline points="${finPts}" fill="none" stroke="#22c55e" stroke-width="2"/>
    ${dots}
  </svg>`;

  // Cumul table
  let cumuRows='';
  proj.forEach((m,i)=>{
    const c=cumuArr[i];
    cumuRows+=`<tr>
      <td style="white-space:nowrap;color:#94a3b8">${m.lb}</td>
      <td class="mn ${m.fin>=0?'pos':'neg'}" style="text-align:right">${eur(m.fin)}</td>
      <td class="mn ${m.eco>=0?'pos':'neg'}" style="text-align:right">${eur(m.eco)}</td>
      <td class="mn ${c>=0?'pos':'neg'}" style="text-align:right">${eur(c)}</td>
    </tr>`;
  });

  return `<div class="page">
    <div class="card">
      <div class="sh">📈 Évolution du solde</div>
      <div style="padding:12px">${svg}
        <div style="display:flex;gap:16px;margin-top:8px;font-size:10px">
          <span style="display:flex;align-items:center;gap:4px"><span style="display:inline-block;width:20px;height:2px;background:#22c55e"></span> Solde fin mois</span>
          <span style="display:flex;align-items:center;gap:4px"><span style="display:inline-block;width:20px;height:2px;background:#f59e0b;opacity:.7;border-top:2px dashed #f59e0b"></span> Avant salaire</span>
        </div>
      </div>
    </div>
    <div class="card">
      <div class="sh">📋 Détail mois par mois</div>
      <div style="overflow-x:auto"><table>
        <tr><th>Mois</th><th style="text-align:right">Solde fin</th><th style="text-align:right">Économie</th><th style="text-align:right">Éco. cumulée</th></tr>
        ${cumuRows}
      </table></div>
    </div>
  </div>`;
}

function updateHdr(){
  const d=SALAIRE-totalDep();
  const el=document.getElementById('hdrDispo');
  if(el){el.textContent=eur(d);el.style.color=d>=0?'#22c55e':'#ef4444';}
}

window.setLeasing=function(k,v){
  const s=load('leasing',{branding:false,stKl:1,brutMens:3850,pause:150,debut:'Aout 2026',actif:false});
  s[k]=v; save('leasing',s); render();
};
window.toggleLeasing=function(v){
  const s=load('leasing',{branding:false,stKl:1,brutMens:3850,pause:150,debut:'Aout 2026',actif:false});
  s.actif=v; save('leasing',s); render();
};

  updateHdr();
}

render();
